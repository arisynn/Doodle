
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle MMO — Ultimate</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@700;900&display=swap');

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body,html{width:100%;height:100%;overflow:hidden;touch-action:none;background:#94a3b8;font-family:'Patrick Hand',cursive;color:#1e293b;display:flex;justify-content:center;align-items:center;}

        /* ── DESKTOP & MOBILE WRAPPER ── */
        #gameContainer {
            position:relative; width:100%; height:100%; max-width:460px;
            background:#f0f4ff; overflow:hidden; box-shadow:0 0 30px rgba(0,0,0,0.4);
        }
        @media (min-width: 480px) {
            #gameContainer { height:95vh; border-radius:24px; border:6px solid #1e293b; }
        }

        .bg-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
            background-image:linear-gradient(#c7d2fe55 1.5px,transparent 1.5px),linear-gradient(90deg,#c7d2fe55 1.5px,transparent 1.5px);
            background-size:44px 44px;}
        .bg-grid::before{content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse 80% 60% at 50% 0%,#e0e7ff80,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,#fce7f380,transparent 60%);}

        canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;}

        /* ── HUD (SYMMETRICAL & COMPACT) ── */
        #hudLayer{position:absolute;inset:0;z-index:10;pointer-events:none;padding:12px;}
        .hud-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;width:100%;}
        .hud-left, .hud-right {width:50%; display:flex; flex-direction:column; gap:6px;}

        .hud-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);
            border:2.5px solid #1e293b;border-radius:14px;
            box-shadow:3px 3px 0 #1e293b22;padding:8px 10px; pointer-events:auto;}
        
        .dot-pulse{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite; flex-shrink:0;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

        #powerBar{width:100%;height:8px;border:2px solid #1e293b;border-radius:999px;background:#f1f5f9;overflow:hidden;display:none;}
        #powerFill{height:100%;width:100%;transition:width .1s;}

        .lb-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1.5px dashed #e2e8f0;}
        .lb-row:last-child{border-bottom:none;}
        .lb-rank{width:20px;text-align:center;display:flex;justify-content:center;}
        .lb-name{flex:1;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem;}
        .lb-score{color:#3b82f6;font-weight:900;font-size:0.8rem;}

        /* ── SVG ICONS ── */
        .icon { width:16px; height:16px; flex-shrink:0; }
        .icon-sm { width:12px; height:12px; flex-shrink:0; }
        .flex-center { display:flex; align-items:center; gap:4px; }

        /* ── LIVE TOP DROPDOWN ── */
        #liveTopBtn{cursor:pointer;font-size:0.75rem;color:#d97706;background:#fef3c7;padding:4px 6px;border-radius:8px;font-weight:800;border:1px solid #fcd34d;display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
        #liveTopBtn:active{background:#fde68a;}
        #liveTopContent, #lbContent{display:none;margin-top:6px;padding-top:4px;border-top:1.5px dashed #cbd5e1;}
        #liveTopContent.open, #lbContent.open{display:block;}

        /* ── MODAL ── */
        #overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
            background:rgba(240,244,255,.6);backdrop-filter:blur(6px);}
        .modal{background:white;border:3px solid #1e293b;border-radius:20px;
            box-shadow:6px 6px 0 #1e293b30;padding:24px 20px;width:90%;max-width:340px;text-align:center;
            animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
        @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
        .modal h1{font-size:2.2rem;font-family:'Nunito',sans-serif;font-weight:900;line-height:1;}
        .modal h1 span{color:#3b82f6;}
        .modal-sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#64748b;margin:4px 0 16px;font-weight:700;}

        .doodle-input{width:100%;padding:10px 14px;border:2.5px solid #cbd5e1;border-radius:12px;
            font-family:'Patrick Hand',cursive;font-size:1.1rem;text-align:center;outline:none;background:#f8fafc;transition:border .2s;}
        .doodle-input:focus{border-color:#3b82f6;}

        .color-row{display:flex;justify-content:center;gap:8px;margin:12px 0;}
        .color-dot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;}
        .color-dot.selected{border-color:#1e293b;transform:scale(1.2);}

        .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;
            width:100%;padding:12px;border:3px solid #1d4ed8;border-radius:12px;
            background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;
            font-family:'Patrick Hand',cursive;font-size:1.1rem;font-weight:700;cursor:pointer;
            box-shadow:0 4px 0 #1d4ed8;transition:transform .1s;}
        .btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 #1d4ed8;}
        #errMsg{color:#ef4444;font-size:.8rem;font-weight:700;min-height:16px;margin:4px 0;}

        /* ── FLOATING CHAT BUTTON ── */
        #chatFab{position:absolute;bottom:20px;right:16px;z-index:30;pointer-events:auto;}
        #chatFabBtn{width:48px;height:48px;border-radius:50%;border:3px solid #1e293b;
            background:white;box-shadow:3px 3px 0 #1e293b30;cursor:pointer;
            display:flex;align-items:center;justify-content:center;transition:transform .15s;}
        #chatFabBtn:active{transform:scale(.92);}
        #chatPopup{position:absolute;bottom:58px;right:0;width:240px;
            background:rgba(255,255,255,.98);border:2.5px solid #1e293b;border-radius:16px;box-shadow:4px 4px 0 #1e293b22;
            padding:10px;display:none;flex-direction:column;gap:6px;}
        #chatPopup.open{display:flex;}
        .qc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
        .qc-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:8px;padding:6px;font-family:'Patrick Hand',cursive;font-size:.8rem;font-weight:700;cursor:pointer;}
        #chatInputRow{display:flex;gap:6px;margin-top:2px;}
        #chatTxt{flex:1;padding:6px 10px;border:2px solid #cbd5e1;border-radius:999px;font-family:'Patrick Hand',cursive;font-size:.85rem;outline:none;}
        #chatSend{width:32px;height:32px;border-radius:50%;background:#3b82f6;border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;}

        /* ── ACTION BUTTONS ── */
        #boostBtn {
            display:none; position:absolute; bottom:120px; left:50%; transform:translateX(-50%); z-index:35; pointer-events:auto;
            background:linear-gradient(135deg, #fde047, #f59e0b); border:3px solid #b45309; border-radius:999px; 
            padding:12px 24px; font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:900; color:#fff; 
            box-shadow:0 6px 0 #b45309; cursor:pointer; transition:transform 0.1s, box-shadow 0.1s; text-shadow:1px 1px 0 #b45309;
        }
        #boostBtn:active { transform:translate(-50%, 4px); box-shadow:0 2px 0 #b45309; }

        /* ── TOUCH ZONES ── */
        #touchZone{position:absolute;bottom:0;left:0;width:100%;height:65%;z-index:5;display:none;}
        .tz{position:absolute;top:0;height:100%;}
        #tzL{left:0;width:50%;}
        #tzR{right:0;width:50%;}

        .float-txt{position:absolute;pointer-events:none;z-index:40;
            font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;
            text-shadow:0 2px 6px #0003;animation:floatUp 1.2s ease-out forwards;text-align:center;width:120px;margin-left:-60px;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="bg-grid"></div>
    <canvas id="gc"></canvas>

    <!-- HUD -->
    <div id="hudLayer">
        <div class="hud-header">
            <!-- LEFT PANEL: SCORE (METER) & LIVE TOP -->
            <div class="hud-left">
                <div id="scoreHud" class="hud-card" style="display:none; flex-direction:column; gap:6px;">
                    <div class="flex-center" style="justify-content:space-between;">
                        <div class="flex-center">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5"><path d="M21 18l-7-10-3 5-4-6-5 11h19z" fill="#fef3c7"/><path d="M21 18l-7-10-3 5-4-6-5 11h19z"/></svg>
                            <span id="scoreVal" style="font-size:1.4rem; color:#3b82f6; font-weight:900; line-height:1;">0m</span>
                        </div>
                        <span style="font-size:0.7rem; color:#64748b; font-weight:700;">High: <span id="highScoreVal">0m</span></span>
                    </div>
                    
                    <div id="liveTopBtn">
                        <div class="flex-center">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60px;" id="liveTopName">-</span> 
                            <span>(<span id="liveTopScore">0m</span>)</span>
                        </div>
                        <svg id="liveTopArrow" class="icon-sm" style="stroke:#d97706;" viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </div>

                    <div id="liveTopContent">
                        <div id="liveTopListRows"></div>
                    </div>
                </div>
                <div id="powerBar"><div id="powerFill"></div></div>
            </div>

            <!-- RIGHT PANEL: LEADERBOARD -->
            <div class="hud-right">
                <div id="lbPanel" class="hud-card" style="display:flex; flex-direction:column; gap:4px;">
                    <div id="lbToggle" class="flex-center" style="justify-content:space-between; cursor:pointer;">
                        <div class="flex-center" style="font-size:0.7rem; color:#64748b; font-weight:700;">
                            <svg class="icon" viewBox="0 0 24 24" fill="#fbbf24" stroke="#d97706" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                            LEADERBOARD
                        </div>
                        <svg id="lbArrow" class="icon-sm" style="stroke:#94a3b8;" viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <div style="font-size:0.8rem; display:flex; justify-content:space-between;">
                        <span id="lbTop1Name" style="font-weight:700; color:#3b82f6; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70px;">Loading..</span>
                        <span id="lbTop1Score" style="color:#f59e0b; font-weight:900;">-</span>
                    </div>
                    <div id="lbContent">
                        <div id="lbRows"></div>
                        <div style="font-size:.6rem;color:#94a3b8;margin-top:6px;text-align:center;">Reset tiap 7 hari</div>
                    </div>
                </div>
                
                <div class="hud-card flex-center" style="display:none; padding:6px 10px; justify-content:center; gap:8px;" id="onlinePill">
                    <div class="dot-pulse"></div>
                    <span style="font-size:0.8rem; color:#64748b;">Online: <strong id="onlineCnt" style="color:#1e293b;">1</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals & Overlays -->
    <button id="boostBtn">⭐ SUPER JUMP! (<span id="boostCount">0</span>)</button>

    <div id="overlay">
        <div class="modal">
            <h1>DOODLE <span>MMO</span></h1>
            <p class="modal-sub">Ultimate Edition 2025</p>

            <input type="text" class="doodle-input" id="nameInput" placeholder="Ketik Namamu..." maxlength="10">
            <div id="errMsg"></div>

            <p style="font-size:.75rem;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Warna Karakter</p>
            <div class="color-row" id="colorRow">
                <div class="color-dot selected" style="background:#e2e8f0;" data-c="#e2e8f0"></div>
                <div class="color-dot" style="background:#fda4af;" data-c="#fda4af"></div>
                <div class="color-dot" style="background:#86efac;" data-c="#86efac"></div>
                <div class="color-dot" style="background:#fde68a;" data-c="#fde68a"></div>
                <div class="color-dot" style="background:#93c5fd;" data-c="#93c5fd"></div>
                <div class="color-dot" style="background:#d8b4fe;" data-c="#d8b4fe"></div>
            </div>

            <button class="btn-primary" id="startBtn" style="margin-top:12px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                MULAI LOMPAT!
            </button>
        </div>
    </div>

    <!-- Floating Chat -->
    <div id="chatFab" style="display:none;">
        <div id="chatPopup">
            <div class="qc-grid" id="qcGrid">
                <button class="qc-btn">Halo semua!</button>
                <button class="qc-btn">Ayo naik!</button>
                <button class="qc-btn">Hahaha!</button>
                <button class="qc-btn">AAAAAA!</button>
                <button class="qc-btn">Tolong!</button>
                <button class="qc-btn">Pusing x_x</button>
            </div>
            <div id="chatInputRow">
                <input type="text" id="chatTxt" placeholder="Pesan bebas..." maxlength="25">
                <button id="chatSend"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
            </div>
        </div>
        <button id="chatFabBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
    </div>

    <!-- Touch Zones -->
    <div id="touchZone">
        <div class="tz" id="tzL"></div>
        <div class="tz" id="tzR"></div>
    </div>
</div>

<script>
// ── CONFIG ──
const UPSTASH_URL   = "https://intense-calf-74085.upstash.io";
const UPSTASH_TOKEN = "gQAAAAAAASFlAAIgcDJjODE2YjZiYjg3OWE0M2NiOTBlMTY5MzRkODBmNzU4Nw";
const ABLY_KEY      = '4opURQ.FVPiqg:z5W8zQxWoBNlXmlAXvOv4Bz1bmn_ISnFucJGpjFijS8';
const LB_KEY        = 'doodle_mmo_lb_v4';
const NAMES_KEY     = 'doodle_mmo_names_v4';
const SAVE_KEY      = 'doodle_mmo_save_state';
const EXPIRE_MS     = 7 * 24 * 60 * 60 * 1000;

// ── SISTEM KOORDINAT UNIVERSAL (100% SYNC FIX) ──
const MAP_W = 420;      
const GROUND_Y = 0;     

// ── CANVAS & RESIZE ──
const container = document.getElementById('gameContainer');
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0, mapOffsetX = 0;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = container.clientWidth; H = container.clientHeight;
    canvas.width  = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    mapOffsetX = (W - MAP_W) / 2;
}
window.addEventListener('resize', resize); resize();

// ── STATE ──
const INK = '#1e293b';
let gameState = 'MENU'; 
let myId = 'dm_' + Math.random().toString(36).substr(2,8);
let playerColor = '#e2e8f0';
let playerName  = 'Doodler';

let p = {
    x: 0, y: 0, vx: 0, vy: 0, oldY: 0, scaleX: 1, scaleY: 1, facing: 'right',
    flyTimer: 0, rocketTimer: 0, springShoesTimer: 0, starCharges: 0, hasShield: false, isFreeFalling: false,
    chatMsg: '', chatTimer: 0, idleBreath: 0, isIdle: false,
    currentPlatform: null, platOffsetX: 0, stunTimer: 0, expressionTimer: 0,
    collectedLoot: new Set()
};

let peers = {}, platforms = new Map(), stars = new Map(), items = new Map(), particles = [];
let camY = 0, currentMeters = 0, displayScore = 0, highScore = parseInt(localStorage.getItem('doodle_hs_meters') || '0');

const GRAVITY = 0.55, JUMP_FORCE = -14, SPRING_FORCE = -20, TRAMPOLINE_FORCE = -25, FLY_FORCE = -20, ROCKET_FORCE = -30, BUMPER_FORCE = -17, BOOST_FORCE = -30;
const TERMINAL_V = 18, FALL_V = 35, MOVE_SPEED = 9, PLAT_GAP = 115;
let keys = { left: false, right: false };

document.getElementById('highScoreVal').textContent = highScore + 'm';

// ── SVG HELPERS ──
function getMedalSVG(rank) {
    const colors = ['#facc15', '#cbd5e1', '#fca5a5'];
    const strokes = ['#ca8a04', '#64748b', '#9a3412'];
    let c = colors[rank-1] || '#e2e8f0'; let s = strokes[rank-1] || '#94a3b8';
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="${c}" stroke="${s}" stroke-width="2"><circle cx="12" cy="12" r="10"/><text x="12" y="16" font-size="12" font-family="Nunito" font-weight="900" text-anchor="middle" fill="${s}" stroke="none">${rank}</text></svg>`;
}

// ── UPSTASH & LEADERBOARD ──
async function upGet(k) { try { let r = await fetch(`${UPSTASH_URL}/get/${k}`, {headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}}); let d = await r.json(); return d.result?JSON.parse(d.result):null; }catch(e){return null;} }
async function upSet(k,v) { try { await fetch(`${UPSTASH_URL}/set/${k}/${encodeURIComponent(JSON.stringify(v))}`, {headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}}); }catch(e){} }

let leaderboard = [];
function lbLocalLoad() { try { let d = localStorage.getItem(LB_KEY); if (d) leaderboard = JSON.parse(d); } catch(e) {} }
function lbLocalSave() { try { localStorage.setItem(LB_KEY, JSON.stringify(leaderboard)); } catch(e) {} }

async function lbFetch() {
    let remote = await upGet(LB_KEY);
    if (remote && Array.isArray(remote)) {
        leaderboard = remote.filter(e => (Date.now() - e.lastActive) < EXPIRE_MS); lbLocalSave();
    } else { lbLocalLoad(); leaderboard = leaderboard.filter(e => (Date.now() - e.lastActive) < EXPIRE_MS); }
    renderLB();
}

async function lbSubmit(name, sc) {
    let now = Date.now(); let idx = leaderboard.findIndex(e => e.name.toLowerCase() === name.toLowerCase());
    if (idx >= 0) { leaderboard[idx].lastActive = now; if (sc > leaderboard[idx].score) leaderboard[idx].score = sc; }
    else { leaderboard.push({ name, score: sc, lastActive: now }); }
    leaderboard.sort((a,b) => b.score - a.score); if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);
    lbLocalSave(); await upSet(LB_KEY, leaderboard); renderLB();
}

async function checkNameAvailable(name) {
    await lbFetch(); let nm = name.toLowerCase(); let entry = leaderboard.find(e => e.name.toLowerCase() === nm);
    if (!entry) return { ok: true };
    if ((Date.now() - entry.lastActive) >= EXPIRE_MS) { leaderboard = leaderboard.filter(e => e.name.toLowerCase() !== nm); return { ok: true }; }
    let myNames = {}; try { myNames = JSON.parse(localStorage.getItem(NAMES_KEY) || '{}'); } catch(e) {}
    if (myNames[nm]) return { ok: true }; 
    return { ok: false, msg: `Nama "${name}" terpakai!` };
}

function claimName(name) {
    let myNames = {}; try { myNames = JSON.parse(localStorage.getItem(NAMES_KEY) || '{}'); } catch(e) {}
    myNames[name.toLowerCase()] = Date.now(); try { localStorage.setItem(NAMES_KEY, JSON.stringify(myNames)); } catch(e) {}
}

function renderLB() {
    const rows = document.getElementById('lbRows');
    rows.innerHTML = leaderboard.slice(0,10).map((e,i)=>`
        <div class="lb-row">
            <span class="lb-rank">${i<3 ? getMedalSVG(i+1) : `<span style="font-size:0.8rem;color:#94a3b8;font-weight:800;">${i+1}</span>`}</span>
            <span class="lb-name">${escHtml(e.name)}</span>
            <span class="lb-score">${e.score}m</span>
        </div>`).join('');
    if (leaderboard.length > 0) { document.getElementById('lbTop1Name').textContent = leaderboard[0].name; document.getElementById('lbTop1Score').textContent = leaderboard[0].score + 'm'; }
    else { document.getElementById('lbTop1Name').textContent = 'Belum ada'; document.getElementById('lbTop1Score').textContent = '-'; }
}
function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── SAVE & RESTORE STATE (AFK BYPASS) ──
function saveState() {
    if (gameState === 'PLAY' && p.y < GROUND_Y - 100) {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ 
            x: p.x, y: p.y, camY: camY, score: currentMeters, 
            stars: p.starCharges, shield: p.hasShield 
        }));
    }
}
function clearState() { localStorage.removeItem(SAVE_KEY); }
window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });


// ── ABLY MULTIPLAYER ──
let ably, chan;
function connectAbly(name) {
    if (ably) { try { ably.close(); } catch(e){} }
    try {
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myId }); 
        chan = ably.channels.get('doodle-mmo-ultimate-v9');
        chan.presence.subscribe(() => { chan.presence.get((err, m) => { if(m) document.getElementById('onlineCnt').textContent = m.length; }); });
        chan.subscribe('sync', msg => {
            if (msg.clientId === myId) return; let d = msg.data, id = msg.clientId;
            if (!peers[id]) peers[id] = { x: d.x, y: d.y, chatTimer: 0, chatMsg: '' };
            Object.assign(peers[id], d, { tx: d.x, ty: d.y, lastSeen: Date.now() });
        });
        chan.subscribe('chat', msg => {
            if (msg.clientId === myId) { p.chatMsg = msg.data.t; p.chatTimer = 160; }
            else if (peers[msg.clientId]) { peers[msg.clientId].chatMsg = msg.data.t; peers[msg.clientId].chatTimer = 160; }
        });
        chan.presence.enter({ name });
    } catch(e) { console.warn('Ably offline'); }
}

function publishSync() {
    if (!chan || gameState === 'MENU') return;
    let isFallingLocal = p.isFreeFalling || p.vy > 10; 
    chan.publish('sync', {
        x: p.x, y: p.y, c: playerColor, n: playerName, sx: p.scaleX, sy: p.scaleY, f: p.facing,
        fly: p.flyTimer>0, rocket: p.rocketTimer>0, ss: p.springShoesTimer>0, sh: p.hasShield,
        s: currentMeters, stun: p.stunTimer>0, fl: isFallingLocal
    });
}
function sendChat(t) { if (!t) return; if (chan) chan.publish('chat', { t }); else { p.chatMsg = t; p.chatTimer = 160; } }
setInterval(() => { publishSync(); let now = Date.now(); for (let id in peers) if (now - peers[id].lastSeen > 4000) delete peers[id]; }, 85);

// ── MANUAL BOOST (STAR JUMP) ──
function updateBoostBtn() {
    const btn = document.getElementById('boostBtn');
    if (p.starCharges > 0 && !p.isFreeFalling && p.stunTimer <= 0) {
        btn.style.display = 'block'; document.getElementById('boostCount').textContent = p.starCharges;
    } else {
        btn.style.display = 'none';
    }
}
function doBoost() {
    if (p.starCharges > 0 && gameState === 'PLAY' && !p.isFreeFalling && p.stunTimer <= 0) {
        p.starCharges--;
        p.vy = BOOST_FORCE;
        spawnParticles(p.x, p.y, '#fbbf24', 25);
        floatText(p.x, p.y, 'SUPER JUMP!', '#f59e0b');
        updateBoostBtn();
    }
}
document.getElementById('boostBtn').onclick = (e) => { e.preventDefault(); doBoost(); };

// ── MAP GEN (ZIG-ZAG ANTI STUCK) ──
function mulberry32(seed) { return function() { let t = seed += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

function generateLevel(lvl) {
    if (lvl === 0) return { type:'ground', x: -1500, y: GROUND_Y, w: 4000 }; 
    let rng = mulberry32(lvl * 7919 + 13337);
    let r1 = rng(), r2 = rng(), r3 = rng(), r4 = rng();
    
    let pw = 60 + r1 * 40;
    let wave = Math.sin(lvl * 0.7) * (MAP_W * 0.25); 
    let centerPath = MAP_W/2 + wave;
    let px = Math.max(10, Math.min(MAP_W - pw - 10, centerPath + (r2 - 0.5) * 80));
    let py = GROUND_Y - lvl * PLAT_GAP;

    let type = 'normal';
    if (lvl > 3) {
        if      (r3 > .96) type = 'portal';
        else if (r3 > .91) type = 'spike';
        else if (r3 > .86) type = 'cloud'; // Cloud Ghost Platform
        else if (r3 > .80) type = 'trampoline';
        else if (r3 > .68) type = 'spring';
        else if (r3 > .56) type = 'fragile';
        else if (r3 > .44) type = 'blinking';
        else if (r3 > .28) type = 'moving';
    }
    if (lvl > 8 && r3 > .98) type = 'bumper';

    let item = null, hasStar = false;
    if (!['spike','portal','bumper','cloud'].includes(type)) {
        if (lvl > 5 && lvl % 15 === 0) {
            if (r4 > .75) item = 'rocket'; else if (r4 > .50) item = 'hat'; else if (r4 > .25) item = 'shoes'; else item = 'shield';
        } else if (r4 > .92) hasStar = true; // Drop rate bintang diperkecil
    }
    return { type, x: px, y: py, w: pw, item, hasStar, baseX: px };
}

// ── PLATFORMS & ITEMS ──
const PLAT_COLORS = { normal: '#86efac', moving: '#60a5fa', spring: '#fde047', trampoline: '#fca5a5', fragile: '#fbbf24', blinking: '#67e8f9', portal: 'transparent', spike: '#f87171', bumper: '#e879f9', ground: '#4ade80' };

class Platform {
    constructor(lvl, data) {
        this.lvl = lvl; Object.assign(this, data);
        this.broken = false; this.fallVy = 0; this.restoreTimer = 0; this.bounceAnim = 0; this.startY = data.y;
        this.color = PLAT_COLORS[data.type] || '#86efac'; this.isSolid = true; this.direction = (lvl % 2 === 0) ? 1 : -1; this.movingRange = 90;
    }
    getX() { return this.type === 'moving' ? this.baseX + Math.sin((Date.now() + this.lvl * 1000) / 1500) * this.movingRange : this.x; }
    update() {
        if (this.bounceAnim > 0) this.bounceAnim--;
        if (this.type === 'blinking') this.isSolid = (Math.floor(Date.now() / 900 + this.lvl) % 2 === 0);
        if (this.type === 'moving') this.x = this.getX();
        if (this.type === 'fragile' && this.broken) {
            this.fallVy += GRAVITY; this.y += this.fallVy; this.restoreTimer--;
            if (this.restoreTimer <= 0) { this.broken = false; this.y = this.startY; this.fallVy = 0; spawnParticles(this.x + this.w/2, this.y, '#fff', 8); }
        }
    }
    draw() {
        if (this.type === 'bumper') { this.drawBumper(); return; }
        if (this.type === 'portal') { this.drawPortal(); return; }
        if (this.type === 'cloud') {
            if (this.broken) return; // Hilang selamanya
            ctx.save(); let cx = this.x, cy = this.y;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)'; ctx.strokeStyle = 'rgba(203, 213, 225, 0.9)'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(cx+12, cy, 14, 0, Math.PI*2); ctx.arc(cx+this.w/2, cy-6, 18, 0, Math.PI*2); ctx.arc(cx+this.w-12, cy, 14, 0, Math.PI*2);
            ctx.fill(); ctx.stroke(); ctx.restore(); return;
        }
        
        // ── TEXTURE GROUND TERKUNCI (ABSOLUT) ──
        if (this.type === 'ground') {
            ctx.save();
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(this.x, this.y, this.w, H + 2000); 
            ctx.strokeStyle = '#15803d'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.w, this.y); ctx.stroke();
            ctx.strokeStyle = '#bbf7d0'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(this.x, this.y+4); ctx.lineTo(this.x + this.w, this.y+4); ctx.stroke();
            ctx.restore();
            return;
        }

        let cx = this.x, cy = this.y, bounce = this.bounceAnim > 0 ? Math.sin((15-this.bounceAnim)/15 * Math.PI) * 5 : 0;
        ctx.save(); ctx.strokeStyle = INK; ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (this.type === 'blinking' && !this.isSolid) ctx.globalAlpha = 0.3;

        if (this.type === 'spike') {
            ctx.fillStyle = '#fca5a5'; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + this.w, cy); ctx.stroke();
            ctx.fillStyle = '#ef4444'; for (let i = 8; i < this.w - 5; i += 16) { ctx.beginPath(); ctx.moveTo(cx+i, cy); ctx.lineTo(cx+i+7, cy-14); ctx.lineTo(cx+i+14, cy); ctx.fill(); ctx.stroke(); }
        } else if (this.type === 'trampoline') {
            ctx.lineWidth = 5.5; ctx.strokeStyle = '#f43f5e'; ctx.beginPath(); ctx.moveTo(cx, cy-bounce); ctx.lineTo(cx+this.w, cy-bounce); ctx.stroke();
            ctx.lineWidth = 2.5; ctx.strokeStyle = INK; ctx.beginPath(); ctx.moveTo(cx+10, cy-bounce); ctx.lineTo(cx+6, cy+10); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+this.w-10, cy-bounce); ctx.lineTo(cx+this.w-6, cy+10); ctx.stroke();
        } else if (this.type === 'spring') {
            ctx.fillStyle = '#fde047'; ctx.beginPath(); ctx.roundRect(cx, cy-4, this.w, 4+bounce, 2); ctx.fill(); ctx.stroke();
            ctx.lineWidth = 3; ctx.strokeStyle = '#ca8a04'; let coils = Math.max(3, Math.floor(this.w / 15));
            for (let i=0;i<coils;i++) { let xp=cx+5+i*(this.w-10)/coils; ctx.beginPath(); ctx.moveTo(xp,cy-4); ctx.lineTo(xp,cy-10); ctx.stroke(); }
        } else if (this.type === 'fragile') {
            ctx.strokeStyle = '#d97706'; ctx.lineWidth = 3; let hw = this.w/2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+hw-5,cy); ctx.lineTo(cx+hw,cy+5); ctx.lineTo(cx+hw+5,cy); ctx.lineTo(cx+this.w,cy); ctx.stroke();
            if (!this.broken) { ctx.lineWidth = 1.5; ctx.strokeStyle = '#fbbf2488'; for (let i=5;i<this.w;i+=12) { ctx.beginPath(); ctx.moveTo(cx+i,cy-3); ctx.lineTo(cx+i+5,cy+4); ctx.stroke(); } }
        } else if (this.type === 'moving') {
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3.5; ctx.setLineDash([8,6]); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+this.w,cy); ctx.stroke(); ctx.setLineDash([]);
            ctx.lineWidth = 2; ctx.strokeStyle = '#93c5fd'; let ax = cx + this.w/2, dir = this.direction; ctx.beginPath(); ctx.moveTo(ax,cy-8); ctx.lineTo(ax+dir*10,cy-8); ctx.lineTo(ax+dir*6,cy-12); ctx.moveTo(ax+dir*10,cy-8); ctx.lineTo(ax+dir*6,cy-4); ctx.stroke();
        } else if (this.type === 'blinking') {
            ctx.strokeStyle = '#06b6d4'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+this.w,cy); ctx.stroke();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#67e8f9'; for (let i=5; i<this.w; i+=10) { ctx.beginPath(); ctx.arc(cx+i,cy,2,0,Math.PI*2); ctx.stroke(); }
        } else { 
            ctx.fillStyle = this.color; ctx.beginPath(); ctx.roundRect(cx, cy-5, this.w, 10, 5); ctx.fill(); ctx.stroke();
            ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff99'; ctx.beginPath(); ctx.moveTo(cx+6,cy-3); ctx.lineTo(cx+this.w-6,cy-3); ctx.stroke();
        }
        ctx.globalAlpha = 1; ctx.restore();
    }
    drawBumper() {
        ctx.save(); let cx = this.x + this.w/2, cy = this.y;
        ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 3;
        for (let i=0;i<2;i++) { ctx.globalAlpha = .5 + i*.4; ctx.beginPath(); ctx.arc(cx, cy, 18-i*5, 0, Math.PI*2); ctx.stroke(); }
        ctx.globalAlpha = 1; ctx.fillStyle = '#f0abfc'; ctx.strokeStyle = INK; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
    }
    drawPortal() {
        ctx.save(); let cx = this.x + this.w/2, cy = this.y, spin = Date.now()/220;
        for (let i=0;i<3;i++) { ctx.strokeStyle = ['#8b5cf6','#a78bfa','#c4b5fd'][i]; ctx.lineWidth = 3-i*0.5; ctx.globalAlpha = .8-i*.2; ctx.beginPath(); ctx.ellipse(cx, cy, 28-i*6, 9, spin+i, 0, Math.PI*2); ctx.stroke(); }
        ctx.globalAlpha = 1; ctx.restore();
    }
}

class StarObj {
    constructor(id, x, y) { this.id = 'st_'+id; this.x = x; this.y = y-26; this.t = 0; }
    update() { this.t += 0.05; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y + Math.sin(this.t)*5); let s = 1 + Math.sin(this.t*2)*.1; ctx.scale(s,s);
        ctx.fillStyle = '#fbbf24'; ctx.strokeStyle = '#b45309'; ctx.lineWidth = 2.5; ctx.lineJoin='round'; ctx.beginPath();
        for(let i=0;i<10;i++) { let r=i%2===0?14:6; let a=(i/10)*Math.PI*2-Math.PI/2; let px=Math.cos(a)*r, py=Math.sin(a)*r; if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
        ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
    }
}
class ItemObj {
    constructor(id, x, y, type) { this.id = 'it_'+id; this.x = x; this.y = y-32; this.type = type; this.t = 0; }
    update() { this.t += 0.08; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y + Math.sin(this.t)*6); ctx.strokeStyle = INK; ctx.lineWidth = 2.5; ctx.lineJoin='round';
        if (this.type === 'hat') {
            ctx.fillStyle = '#60a5fa'; ctx.beginPath(); ctx.arc(0,5,14,Math.PI,0); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-18,5); ctx.lineTo(18,5); ctx.lineWidth=4; ctx.stroke(); ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(0,-18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-12,-18); ctx.lineTo(12,-18); ctx.lineWidth=4; ctx.strokeStyle='#cbd5e1'; ctx.stroke();
        } else if (this.type === 'rocket') {
            ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(-8,5); ctx.lineTo(8,5); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle='#cbd5e1'; ctx.beginPath(); ctx.moveTo(-8,5); ctx.lineTo(-12,14); ctx.lineTo(-4,5); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(8,5); ctx.lineTo(12,14); ctx.lineTo(4,5); ctx.fill(); ctx.stroke();
        } else if (this.type === 'shoes') {
            ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(-12,-6,24,14,4); ctx.fill(); ctx.stroke();
            ctx.strokeStyle='#15803d'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-6,8); ctx.lineTo(-9,14); ctx.lineTo(0,18); ctx.stroke(); ctx.beginPath(); ctx.moveTo(6,8); ctx.lineTo(3,14); ctx.lineTo(12,18); ctx.stroke();
        } else if (this.type === 'shield') {
            ctx.fillStyle = 'rgba(6, 182, 212, 0.4)'; ctx.strokeStyle = '#06b6d4';
            ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-5,-6,4,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }
}

function spawnParticles(x, y, color, amt) { for(let i=0;i<amt;i++) particles.push({ x, y, vx:(Math.random()-.5)*11, vy:(Math.random()-.5)*11, life:1, c:color, s:Math.random()*4+2, type: Math.random()>.5?'circle':'line' }); }

function floatText(x, y, text, color='#fbbf24') {
    const el = document.createElement('div'); el.className = 'float-txt'; el.textContent = text; el.style.color = color;
    el.style.left = (x + mapOffsetX) + 'px'; 
    el.style.top  = (y - camY - 20) + 'px'; document.getElementById('gameContainer').appendChild(el); setTimeout(() => el.remove(), 1200);
}

function buildMap() { 
    platforms.clear(); stars.clear(); items.clear(); 
    let topLvl = Math.floor((GROUND_Y - camY + H) / PLAT_GAP) + 20;
    let botLvl = Math.max(0, Math.floor((GROUND_Y - (camY+H)) / PLAT_GAP) - 5);
    for (let i=botLvl; i <= topLvl; i++) initLevel(i);
}

function initLevel(lvl) {
    if (platforms.has(lvl)) return; let d = generateLevel(lvl); let pl = new Platform(lvl, d); pl.w = d.w; pl.baseX = d.x; platforms.set(lvl, pl);
    if (d.hasStar) stars.set(lvl, new StarObj(lvl, d.x + d.w/2, d.y)); if (d.item) items.set(lvl, new ItemObj(lvl, d.x + d.w/2, d.y, d.item));
}

// ── RESET GAME & RESUME STATE ──
function resetGame(keepPosition = false, resume = false) {
    p.vy = JUMP_FORCE; p.vx = 0;
    p.flyTimer=0; p.rocketTimer=0; p.springShoesTimer=0;
    p.scaleX=1; p.scaleY=1; p.isIdle=false; p.currentPlatform=null; p.facing='right'; 
    p.stunTimer = 0; p.platOffsetX = 0; p.isFreeFalling = false;
    p.collectedLoot.clear(); p.expressionTimer=0;
    particles=[];

    if (!keepPosition) {
        let saved = resume ? JSON.parse(localStorage.getItem(SAVE_KEY) || 'null') : null;
        if (saved && saved.y < GROUND_Y - 100) {
            p.x = saved.x; p.y = saved.y; camY = saved.camY; currentMeters = saved.score; displayScore = currentMeters;
            p.starCharges = saved.stars || 0; p.hasShield = saved.shield || false;
        } else {
            p.x = MAP_W/2; p.y = GROUND_Y - 80; camY = GROUND_Y - H + 20; currentMeters = 0; displayScore = 0;
            p.starCharges = 0; p.hasShield = false;
        }
    }
    
    buildMap(); updateBoostBtn();
    document.getElementById('scoreVal').textContent = Math.floor(displayScore) + 'm';
    document.getElementById('powerBar').style.display = 'none';
    gameState = 'PLAY';
}

function drawCharacter(cx, cy, color, scX, scY, name, facing, flyT, rocketT, ssT, isLocal, chatMsg, chatTimer, expresT, stunT, isFalling, hasShield) {
    let w=44, h=54; ctx.save();
    
    let eox = 0;
    if (facing === 'right') eox = 5;
    else if (facing === 'left') eox = -5;
    
    ctx.font = `900 15px 'Nunito',sans-serif`; ctx.textAlign='center';
    ctx.strokeStyle='white'; ctx.lineWidth=4; ctx.strokeText(name, cx, cy-h-25);
    ctx.fillStyle='#334155'; ctx.fillText(name, cx, cy-h-25);
    
    if (chatTimer > 0 && chatMsg) {
        ctx.save(); ctx.font = "700 13px 'Patrick Hand',cursive"; let tw = Math.max(50, ctx.measureText(chatMsg).width + 20), th=28;
        ctx.translate(cx, cy-h-50); ctx.fillStyle='rgba(255,255,255,.96)'; ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(-tw/2,-th,tw,th,12); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(6,0); ctx.lineTo(0,7); ctx.fill();
        ctx.fillStyle='#334155'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(chatMsg, 0, -th/2); ctx.restore();
    }

    ctx.translate(cx, cy); ctx.scale(scX, scY);

    if (hasShield) {
        ctx.fillStyle = 'rgba(6, 182, 212, 0.25)'; ctx.strokeStyle = '#06b6d4'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, -h/2, 36, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    if (rocketT > 0 && stunT <= 0) {
        ctx.fillStyle='#ef4444'; ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-h-15); ctx.lineTo(-10,-h+5); ctx.lineTo(10,-h+5); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#cbd5e1'; ctx.beginPath(); ctx.moveTo(-10,-h+5); ctx.lineTo(-15,-h+16); ctx.lineTo(-5,-h+5); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(10,-h+5); ctx.lineTo(15,-h+16); ctx.lineTo(5,-h+5); ctx.fill(); ctx.stroke();
        if (rocketT % 2===0) spawnParticles(cx, cy+5, '#f97316', 1);
    }
    if (flyT > 0 && stunT <= 0) {
        ctx.lineWidth=3; ctx.fillStyle='#3b82f6'; ctx.strokeStyle=INK; ctx.beginPath(); ctx.arc(0,-h+2,16,Math.PI,0); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,-h+2); ctx.lineTo(0,-h-12); ctx.stroke();
        let spin=Date.now()/40; let bw=Math.cos(spin)*28; ctx.beginPath(); ctx.moveTo(-bw,-h-12); ctx.lineTo(bw,-h-12); ctx.lineWidth=5; ctx.strokeStyle='#94a3b8'; ctx.stroke();
    }
    if (ssT > 0 && stunT <= 0) {
        ctx.fillStyle='#22c55e'; ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(-15,0,12,7,3); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.roundRect(3,0,12,7,3); ctx.fill(); ctx.stroke();
        ctx.strokeStyle='#15803d'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-9,7); ctx.lineTo(-13,12); ctx.lineTo(-5,16); ctx.stroke(); ctx.beginPath(); ctx.moveTo(9,7); ctx.lineTo(5,12); ctx.lineTo(13,16); ctx.stroke();
    }

    let grad = ctx.createRadialGradient(-w*.15, -h*.6, 4, 0, -h/2, w);
    grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, color);
    ctx.fillStyle=grad; ctx.strokeStyle=INK; ctx.lineWidth=3.5; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(0,-h); ctx.bezierCurveTo(w*.6,-h, w/2+5,0, 0,0); ctx.bezierCurveTo(-w/2-5,0, -w*.6,-h, 0,-h); ctx.fill(); ctx.stroke();
    
    ctx.fillStyle='rgba(255,150,150,.35)'; 
    ctx.beginPath(); ctx.arc(-13+eox,-h*.45,5,0,Math.PI*2); ctx.arc(13+eox,-h*.45,5,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=INK; ctx.strokeStyle=INK;
    let isBlinking = (expresT % 180 < 8), isExcited = (rocketT > 0 || flyT > 0), isStunned = (stunT > 0);

    if (isStunned) {
        ctx.lineWidth = 2.5; let eyeSize = 4;
        ctx.beginPath(); ctx.moveTo(-10+eox-eyeSize, -h*.6-eyeSize); ctx.lineTo(-10+eox+eyeSize, -h*.6+eyeSize); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-10+eox-eyeSize, -h*.6+eyeSize); ctx.lineTo(-10+eox+eyeSize, -h*.6-eyeSize); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(10+eox-eyeSize, -h*.6-eyeSize); ctx.lineTo(10+eox+eyeSize, -h*.6+eyeSize); ctx.stroke(); ctx.beginPath(); ctx.moveTo(10+eox-eyeSize, -h*.6+eyeSize); ctx.lineTo(10+eox+eyeSize, -h*.6-eyeSize); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-6+eox, -h*.4); ctx.quadraticCurveTo(-3+eox, -h*.4-4, 0+eox, -h*.4); ctx.quadraticCurveTo(3+eox, -h*.4+4, 6+eox, -h*.4); ctx.stroke();

        let stT = Date.now() / 150;
        for(let i=0; i<3; i++) {
            let sx = Math.cos(stT + i*Math.PI*2/3) * 18, sy = -h - 15 + Math.sin(stT + i*Math.PI*2/3) * 5;
            ctx.fillStyle = '#fde047'; ctx.strokeStyle = '#ca8a04'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(sx, sy-4); ctx.lineTo(sx+2, sy-1); ctx.lineTo(sx+5, sy-1); ctx.lineTo(sx+2, sy+1); ctx.lineTo(sx+3, sy+4); ctx.lineTo(sx, sy+2); ctx.lineTo(sx-3, sy+4); ctx.lineTo(sx-2, sy+1); ctx.lineTo(sx-5, sy-1); ctx.lineTo(sx-2, sy-1); ctx.closePath(); ctx.fill(); ctx.stroke();
        }
    } else if (isExcited) {
        let drawStar = (ex,ey)=>{ ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(ex,ey-4); ctx.lineTo(ex+2,ey-1); ctx.lineTo(ex+5,ey-1); ctx.lineTo(ex+2,ey+1); ctx.lineTo(ex+3,ey+5); ctx.lineTo(ex,ey+2); ctx.lineTo(ex-3,ey+5); ctx.lineTo(ex-2,ey+1); ctx.lineTo(ex-5,ey-1); ctx.lineTo(ex-2,ey-1); ctx.closePath(); ctx.fill(); ctx.stroke(); };
        drawStar(-8+eox,-h*.65); drawStar(8+eox,-h*.65); ctx.beginPath(); ctx.arc(eox,-h*.4,6,0,Math.PI); ctx.lineWidth=2.5; ctx.stroke();
    } else if (isFalling) {
        ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(-12+eox,-h*.7); ctx.lineTo(-4+eox,-h*.55); ctx.stroke(); ctx.beginPath(); ctx.moveTo(12+eox,-h*.7); ctx.lineTo(4+eox,-h*.55); ctx.stroke();
        ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(eox,-h*.38,7,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.stroke();
    } else if (isBlinking) {
        ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(-10+eox,-h*.65); ctx.lineTo(-4+eox,-h*.65); ctx.stroke(); ctx.beginPath(); ctx.moveTo(4+eox,-h*.65); ctx.lineTo(10+eox,-h*.65); ctx.stroke(); ctx.beginPath(); ctx.arc(eox,-h*.45,4,.2,Math.PI-.2); ctx.stroke();
    } else {
        ctx.beginPath(); ctx.arc(-7+eox,-h*.65,3.5,0,Math.PI*2); ctx.arc(7+eox,-h*.65,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(eox,-h*.45,4,.15,Math.PI-.15); ctx.lineWidth=2.5; ctx.stroke();
    }
    ctx.restore();
}

function updateLiveTopUI() {
    let allPlayers = [{ n: playerName, s: currentMeters }];
    for (let id in peers) allPlayers.push({ n: peers[id].n, s: peers[id].s || 0 });
    allPlayers.sort((a,b) => b.s - a.s); let top5 = allPlayers.slice(0, 5);
    document.getElementById('liveTopName').textContent = top5[0].s === 0 ? "-" : top5[0].n;
    document.getElementById('liveTopScore').textContent = top5[0].s + 'm';
    document.getElementById('liveTopListRows').innerHTML = top5.map((p, i) => `
        <div class="lb-row">
            <span class="lb-rank" style="font-size:0.8rem; font-weight:800; color:#d97706;">#${i+1}</span>
            <span class="lb-name" style="font-size:0.8rem; color:#334155;">${escHtml(p.n)}</span>
            <span class="lb-score" style="font-size:0.85rem; color:#b45309;">${p.s}m</span>
        </div>
    `).join('');
}

window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doBoost(); } });

function loop() {
    requestAnimationFrame(loop); ctx.clearRect(0,0,W,H);
    if (gameState === 'MENU') return;

    p.oldY = p.y; p.expressionTimer++; if (p.chatTimer > 0) p.chatTimer--;
    const pwrCon = document.getElementById('powerBar'), pwrFill = document.getElementById('powerFill');
    pwrCon.style.display = 'none';

    // ── METER COUNTDOWN (KETINGGIAN) ──
    currentMeters = Math.max(0, Math.floor((GROUND_Y - p.y) / 50));
    if (gameState === 'PLAY' && currentMeters > highScore) { 
        highScore = currentMeters; document.getElementById('highScoreVal').textContent = highScore + 'm'; localStorage.setItem('doodle_hs_meters', highScore); 
    }
    
    // Muluskan visual hitungan mundur atau naik
    if (displayScore < currentMeters) displayScore = currentMeters; 
    else if (displayScore > currentMeters) {
        displayScore -= Math.max(1, (displayScore - currentMeters) * 0.08);
        if (displayScore < currentMeters) displayScore = currentMeters;
    }
    document.getElementById('scoreVal').textContent = Math.floor(displayScore) + 'm';

    // ── LOGIKA JATUH BEBAS (FREE FALL) & SADAR OTOMATIS ──
    if (p.stunTimer > 0) {
        p.stunTimer--; p.vx = 0; p.vy = 0; p.y = GROUND_Y;
        p.scaleX += (1 - p.scaleX) * 0.1; p.scaleY += (1 - p.scaleY) * 0.1;
        if (p.stunTimer <= 0) {
            floatText(p.x, p.y, "Ayo naik!", "#22c55e");
            updateBoostBtn();
        }
    } else {
        if (p.rocketTimer > 0) { p.rocketTimer--; p.vy = ROCKET_FORCE; pwrCon.style.display='block'; pwrFill.style.width=(p.rocketTimer/80*100)+'%'; pwrFill.style.background='#ef4444'; }
        else if (p.flyTimer > 0) { p.flyTimer--; p.vy = FLY_FORCE; pwrCon.style.display='block'; pwrFill.style.width=(p.flyTimer/150*100)+'%'; pwrFill.style.background='#60a5fa'; }
        else { p.vy += GRAVITY; if (p.vy > TERMINAL_V) p.vy = TERMINAL_V; }
        
        if (p.springShoesTimer > 0) { p.springShoesTimer--; pwrCon.style.display='block'; pwrFill.style.width=(p.springShoesTimer/600*100)+'%'; pwrFill.style.background='#22c55e'; }

        let targetVx = 0;
        if (p.isIdle) {
            p.vx = 0; p.vy = 0; p.idleBreath += .06; p.scaleX = 1+Math.sin(p.idleBreath)*.05; p.scaleY = 1-Math.sin(p.idleBreath)*.03;
            if (keys.left || keys.right) { p.isIdle = false; p.currentPlatform = null; let f = p.springShoesTimer > 0 ? JUMP_FORCE*1.3 : JUMP_FORCE; p.vy = f; spawnParticles(p.x, p.y, '#e2e8f0', 4); }
        } else {
            if (keys.left) { targetVx = -MOVE_SPEED; p.facing = 'left'; }
            else if (keys.right) { targetVx = MOVE_SPEED; p.facing = 'right'; }
            else { targetVx = 0; }
            p.vx += (targetVx - p.vx) * .3;
        }

        p.x += p.vx; p.y += p.vy;
        
        if (p.x < -22) p.x = MAP_W+22; else if (p.x > MAP_W+22) p.x = -22;

        if (!p.isIdle) { let tSy = 1, tSx = 1; if (p.vy < -5) { tSy=1.18; tSx=.88; } else if (p.vy > 5) { tSy=1.06; tSx=.96; } p.scaleX += (tSx-p.scaleX)*.2; p.scaleY += (tSy-p.scaleY)*.2; }

        // Memicu jatuh bebas jika keluar layar bawah
        if (gameState === 'PLAY' && p.y > camY + H + 50 && !p.isFreeFalling) {
            p.isFreeFalling = true; updateBoostBtn();
            p.chatMsg = 'AAAAAA!!!'; p.chatTimer = 100; if (chan) chan.publish('chat',{t:'AAAAAA!!!'});
        }

        // Hantam Tanah (Ground)
        if (p.y >= GROUND_Y) {
            p.y = GROUND_Y; p.vy = 0; p.vx = 0; p.isFreeFalling = false;
            p.scaleX = 1.6; p.scaleY = 0.4; p.stunTimer = 80; 
            spawnParticles(p.x, GROUND_Y, '#ef4444', 40);
            p.chatMsg = 'Aduh... x_x'; p.chatTimer = 100;
            if (chan) chan.publish('chat', {t: 'Aduh... x_x'});
            lbSubmit(playerName, Math.max(0, currentMeters)); clearState(); // Menyentuh tanah berarti reset progress state
        }
    }

    // ── KAMERA ──
    if (p.isFreeFalling) {
        camY += ((p.y - H/2) - camY) * 0.15; // Kamera meluncur ke bawah ngikutin pemain jatuh
    } else if (gameState === 'PLAY') {
        let tCam = p.y - H*.52; if (tCam < camY) camY += (tCam-camY)*.22;
    }

    let maxCamY = GROUND_Y - H + 20;
    if (camY > maxCamY) camY = maxCamY;

    // Render culling
    let topLvl = Math.floor((GROUND_Y - camY + H) / PLAT_GAP) + 5; 
    let botLvl = Math.max(0, Math.floor((GROUND_Y - (camY+H)) / PLAT_GAP) - 3);
    for (let l=botLvl; l<=topLvl; l++) initLevel(l);
    for (let [k,v] of platforms) if (k>0 && (k<botLvl-8||k>topLvl+8)) { platforms.delete(k); stars.delete(k); items.delete(k); }

    updateLiveTopUI(); 
    ctx.save(); ctx.translate(mapOffsetX, -camY);

    for (let [k,pl] of platforms) { pl.update(); pl.draw(); }

    if (gameState === 'PLAY') {
        for (let [k,s] of stars) {
            if (p.collectedLoot.has(s.id)) continue; s.update(); s.draw();
            // ── DAPAT BINTANG (TAMBAH CHARGE LOMPAT MANUAL) ──
            if (p.flyTimer<=0 && p.rocketTimer<=0 && Math.abs(p.x-s.x)<34 && p.y>s.y-34 && p.y<s.y+20) { 
                p.collectedLoot.add(s.id); p.starCharges++; updateBoostBtn();
                spawnParticles(s.x, s.y, '#fbbf24', 12); floatText(s.x, s.y, '+1 BINTANG!', '#f59e0b'); 
            }
        }
        for (let [k,it] of items) {
            if (p.collectedLoot.has(it.id)) continue; it.update(); it.draw();
            if (p.flyTimer <= 0 && p.rocketTimer <= 0) {
                if (Math.abs(p.x-it.x)<36 && p.y>it.y-36 && p.y<it.y+22) {
                    p.collectedLoot.add(it.id); spawnParticles(it.x, it.y, '#fff', 16);
                    if (it.type==='hat') { p.flyTimer=150; floatText(it.x,it.y,'TERBANG!','#60a5fa'); } 
                    if (it.type==='rocket') { p.rocketTimer=80; floatText(it.x,it.y,'ROKET!','#ef4444'); } 
                    if (it.type==='shoes') { p.springShoesTimer=600; floatText(it.x,it.y,'SEPATU PEGAS!','#22c55e'); }
                    if (it.type==='shield') { p.hasShield=true; floatText(it.x,it.y,'PERISAI!','#06b6d4'); }
                }
            }
        }
    } else {
        for (let [k,s] of stars) if(!p.collectedLoot.has(s.id)) s.draw();
        for (let [k,it] of items) if(!p.collectedLoot.has(it.id)) it.draw();
    }

    // Hanya bisa menginjak platform jika sedang tidak Free Falling
    if (gameState === 'PLAY' && p.vy > 0 && p.flyTimer<=0 && p.rocketTimer<=0 && !p.isIdle && !p.isFreeFalling) {
        for (let [k,pl] of platforms) {
            // Abaikan pijakan kalau platform sudah di luar batas bawah layar
            if (pl.broken || !pl.isSolid || pl.y > camY + H + 10) continue; 
            let rx = pl.type==='moving' ? pl.x : pl.x;
            if (p.x+16 > rx && p.x-16 < rx+pl.w && p.oldY <= pl.y+8 && p.y >= pl.y-6) {
                p.y = pl.y;
                if (pl.type==='portal') { spawnParticles(p.x, p.y, '#a855f7', 18); p.y -= 900; camY -= 900; p.vy = JUMP_FORCE; break; }
                if (pl.type==='cloud') { pl.broken=true; spawnParticles(rx+pl.w/2,pl.y,'#fff',15); let f=p.springShoesTimer>0?JUMP_FORCE*1.3:JUMP_FORCE; p.vy=f; p.scaleX=1.35; p.scaleY=.7; break; }
                if (pl.type==='spike') { 
                    if (p.hasShield) { p.hasShield = false; p.vy = BUMPER_FORCE; spawnParticles(p.x, p.y, '#06b6d4', 20); floatText(p.x, p.y, 'PERISAI PECAH!', '#06b6d4'); }
                    else { spawnParticles(p.x, p.y, '#ef4444', 12); p.vy = BUMPER_FORCE; p.vx = (Math.random()>.5?8:-8); p.chatMsg='Aduh!!'; p.chatTimer=80; if(chan)chan.publish('chat',{t:'Aduh!!'}); }
                    break; 
                }
                if (pl.type==='bumper') { p.vy = BUMPER_FORCE; p.vx = (p.x < rx+pl.w/2) ? -10 : 10; spawnParticles(p.x,p.y,'#f0abfc',10); pl.bounceAnim=15; break; }
                if (pl.type==='fragile') { pl.broken=true; pl.restoreTimer=180; spawnParticles(rx+pl.w/2,pl.y,pl.color,12); let f=p.springShoesTimer>0?JUMP_FORCE*1.3:JUMP_FORCE; p.vy=f; p.scaleX=1.35; p.scaleY=.7; break; }
                if (pl.type==='spring') { p.vy=SPRING_FORCE; p.scaleX=1.4; p.scaleY=.65; pl.bounceAnim=15; spawnParticles(p.x,p.y,'#fde047',6); break; }
                if (pl.type==='trampoline') { p.vy=TRAMPOLINE_FORCE; p.scaleX=1.5; p.scaleY=.55; pl.bounceAnim=15; spawnParticles(p.x,p.y,'#fca5a5',8); break; }
                if (!keys.left && !keys.right) { p.isIdle=true; p.currentPlatform=pl; p.idleBreath=0; p.platOffsetX = p.x - pl.x; } 
                else { let f=p.springShoesTimer>0?JUMP_FORCE*1.3:JUMP_FORCE; p.vy=f; p.scaleX=1.35; p.scaleY=.7; }
                spawnParticles(p.x, p.y+5, '#e2e8f0', 4); break;
            }
        }
    }

    if (p.isIdle && p.currentPlatform) { let pl = p.currentPlatform; if (pl.type==='moving') p.x = pl.x + p.platOffsetX; p.y = pl.y; }

    for (let i=particles.length-1;i>=0;i--) {
        let pt=particles[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.life-=.04;
        if (pt.life<=0) { particles.splice(i,1); continue; }
        ctx.globalAlpha=pt.life; ctx.fillStyle=ctx.strokeStyle=pt.c; ctx.lineWidth=2; ctx.beginPath();
        if (pt.type==='circle') ctx.arc(pt.x,pt.y,pt.s,0,Math.PI*2); else { ctx.moveTo(pt.x,pt.y); ctx.lineTo(pt.x+pt.vx*2,pt.y+pt.vy*2); ctx.stroke(); }
        ctx.fill(); ctx.globalAlpha=1;
    }

    for (let id in peers) {
        let op=peers[id]; if (op.tx!==undefined) { op.x+=(op.tx-op.x)*.28; op.y+=(op.ty-op.y)*.28; }
        if (op.n) drawCharacter(op.x, op.y, op.c||'#e2e8f0', op.sx||1, op.sy||1, op.n, op.f||'right', op.fly?30:0, op.rocket?30:0, op.ss?30:0, false, op.chatMsg||'', op.chatTimer||0, 90, op.stun?1:0, op.fl, op.sh);
    }
    
    let isFallingLocal = p.isFreeFalling || p.vy > 10;
    drawCharacter(p.x, p.y, playerColor, p.scaleX, p.scaleY, playerName, p.facing, p.flyTimer, p.rocketTimer, p.springShoesTimer, true, p.chatMsg, p.chatTimer, p.expressionTimer, p.stunTimer, isFallingLocal, p.hasShield);
    
    ctx.restore(); 
}

// ── UI INTERACTIONS & INPUT ──
document.getElementById('lbToggle').onclick = () => { let c = document.getElementById('lbContent'), a = document.getElementById('lbArrow'); c.classList.toggle('open'); a.style.transform = c.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; };
document.getElementById('liveTopBtn').onclick = () => { let c = document.getElementById('liveTopContent'), a = document.getElementById('liveTopArrow'); c.classList.toggle('open'); a.style.transform = c.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; };
document.querySelectorAll('.color-dot').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.color-dot').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); playerColor = btn.dataset.c; }; });

document.getElementById('startBtn').onclick = async () => {
    let name = document.getElementById('nameInput').value.trim(); const err = document.getElementById('errMsg');
    if (!name) { err.textContent = 'Masukkan nama dulu!'; return; } if (name.length < 2) { err.textContent = 'Minimal 2 huruf!'; return; }
    err.textContent = 'Mengecek...'; document.getElementById('startBtn').disabled = true;
    let check = await checkNameAvailable(name);
    if (!check.ok) { err.textContent = check.msg; document.getElementById('startBtn').disabled = false; return; }
    claimName(name); playerName = name;
    
    localStorage.setItem('doodle_name', playerName);
    localStorage.setItem('doodle_color', playerColor);

    document.getElementById('overlay').style.display = 'none'; document.getElementById('scoreHud').style.display = 'flex'; document.getElementById('onlinePill').style.display = 'flex'; document.getElementById('chatFab').style.display = 'block'; document.getElementById('touchZone').style.display = 'flex';
    connectAbly(name); resetGame(false, true); lbFetch();
};

let savedName = localStorage.getItem('doodle_name');
let savedColor = localStorage.getItem('doodle_color');
if (savedName) document.getElementById('nameInput').value = savedName;
if (savedColor) {
    playerColor = savedColor;
    document.querySelectorAll('.color-dot').forEach(btn => {
        btn.classList.remove('selected');
        if (btn.dataset.c === savedColor) btn.classList.add('selected');
    });
}

document.getElementById('tzL').addEventListener('touchstart',e=>{if(gameState==='PLAY'){e.preventDefault();keys.left=true;p.facing='left';}},{passive:false});
document.getElementById('tzL').addEventListener('touchend',  e=>{if(gameState==='PLAY'){e.preventDefault();keys.left=false;}},{passive:false});
document.getElementById('tzR').addEventListener('touchstart',e=>{if(gameState==='PLAY'){e.preventDefault();keys.right=true;p.facing='right';}},{passive:false});
document.getElementById('tzR').addEventListener('touchend',  e=>{if(gameState==='PLAY'){e.preventDefault();keys.right=false;}},{passive:false});
document.getElementById('tzL').addEventListener('mousedown',()=>{keys.left=true;p.facing='left';}); 
document.getElementById('tzL').addEventListener('mouseup',()=>{keys.left=false;});
document.getElementById('tzR').addEventListener('mousedown',()=>{keys.right=true;p.facing='right';}); 
document.getElementById('tzR').addEventListener('mouseup',()=>{keys.right=false;});

const chatFabBtn = document.getElementById('chatFabBtn'), chatPopup  = document.getElementById('chatPopup');
chatFabBtn.onclick = () => chatPopup.classList.toggle('open');
document.querySelectorAll('.qc-btn').forEach(btn => { btn.onclick = () => { sendChat(btn.textContent); chatPopup.classList.remove('open'); }; });
document.getElementById('chatSend').onclick = () => { let v = document.getElementById('chatTxt').value.trim(); if (v) { sendChat(v); document.getElementById('chatTxt').value=''; chatPopup.classList.remove('open'); } };
document.getElementById('chatTxt').addEventListener('keypress', e => { if (e.key==='Enter') { let v = e.target.value.trim(); if (v) { sendChat(v); e.target.value=''; chatPopup.classList.remove('open'); } } });
document.addEventListener('click', e => { if (!document.getElementById('chatFab').contains(e.target)) chatPopup.classList.remove('open'); });

lbFetch(); loop();
</script>
